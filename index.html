<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>for you 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EF;
    --rose:#FF6F91;
    --rose-deep:#E1436A;
    --plum:#4A2545;
    --peach:#FFC97A;
    --pink-soft:#FFD9E4;
    --lavender:#C9A7EB;
    --gold:#FFD166;
    --mint:#8FE3C4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--cream);
    font-family:'Quicksand',sans-serif;
    color:var(--plum);
    -webkit-user-select:none; user-select:none;
  }
  #app{
    position:relative; width:100%; height:100vh; height:100dvh;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,217,228,0.9), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(201,167,235,0.35), transparent 50%),
      var(--cream);
  }
  .drift{position:absolute; font-size:22px; opacity:.35; animation:driftUp linear infinite; pointer-events:none;}
  @keyframes driftUp{
    0%{transform:translateY(10vh) translateX(0) rotate(0deg); opacity:0;}
    10%{opacity:.4;}
    90%{opacity:.3;}
    100%{transform:translateY(-110vh) translateX(20px) rotate(25deg); opacity:0;}
  }

  .scene{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 24px; text-align:center;
    opacity:0; pointer-events:none; visibility:hidden;
    transition:opacity .5s ease;
  }
  .scene.active{opacity:1; pointer-events:auto; visibility:visible;}

  h1.headline{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(24px, 6vw, 34px);
    line-height:1.25;
    margin:18px 0 6px;
    color:var(--rose-deep);
    max-width:340px;
  }
  p.sub{
    font-size:15px; color:var(--plum); opacity:.75; margin:0 0 18px; max-width:300px;
  }

  .card{
    position:relative;
    width:min(70vw, 270px);
    aspect-ratio:1/1;
    touch-action:none;
    display:flex; align-items:center; justify-content:center;
  }
  .card.grabbable{cursor:grab;}
  .card.dragging{cursor:grabbing;}

  .mascot-img{
    width:88%; height:88%; object-fit:contain; display:block;
    filter:drop-shadow(0 14px 22px rgba(74,37,69,0.28));
    animation:idleFloat 3.4s ease-in-out infinite;
  }
  @keyframes idleFloat{0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);}}

  .face-layer{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .45s ease;
  }
  .face-layer.on{opacity:1;}

  .hint{
    margin-top:22px; display:flex; align-items:center; gap:8px;
    font-family:'Baloo 2',sans-serif; font-weight:600; font-size:14px;
    color:var(--rose-deep); opacity:.85;
    animation:pulseHint 1.8s ease-in-out infinite;
  }
  .hint.hidden{visibility:hidden;}
  @keyframes pulseHint{0%,100%{transform:translateX(0); opacity:.6;} 50%{transform:translateX(6px); opacity:1;}}

  .dots{position:absolute; bottom:26px; left:0; right:0; display:flex; justify-content:center; gap:8px;}
  .dots span{width:7px; height:7px; border-radius:50%; background:var(--pink-soft); transition:all .3s ease;}
  .dots span.active{background:var(--rose-deep); width:20px; border-radius:6px;}

  .kiss-btn{
    width:88px; height:88px; border-radius:50%;
    background:linear-gradient(145deg, var(--rose), var(--rose-deep));
    border:none; display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 30px rgba(225,67,106,0.4);
    cursor:pointer; margin-top:16px;
    font-size:38px;
    animation:beat 1.6s ease-in-out infinite;
  }
  @keyframes beat{0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}}
  .kiss-btn.hidden{display:none;}
  .tapme{margin-top:12px; font-size:13px; color:var(--plum); opacity:.55;}

  .cam-wrap{
    position:relative; width:min(84vw,320px); aspect-ratio:3/4;
    border-radius:28px; overflow:hidden;
    box-shadow:0 20px 50px rgba(74,37,69,0.25);
    background:#000;
  }
  video{width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block;}
  .glow-overlay{position:absolute; inset:0; pointer-events:none; mix-blend-mode:soft-light; background:radial-gradient(circle at 50% 40%, rgba(255,209,102,0.55), rgba(255,111,145,0.25) 55%, rgba(74,37,69,0.35) 100%);}
  .vignette{position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 60px 20px rgba(74,37,69,0.35);}
  .sparkle-layer{position:absolute; inset:0; pointer-events:none; overflow:hidden;}
  .spk{position:absolute; font-size:16px; opacity:0; animation:sparkleFloat 3.2s ease-in-out infinite;}
  @keyframes sparkleFloat{0%{opacity:0; transform:translateY(0) scale(.6);} 20%{opacity:1;} 50%{transform:translateY(-14px) scale(1.05);} 80%{opacity:.7;} 100%{opacity:0; transform:translateY(-28px) scale(.7);}}
  .cam-caption{
    position:absolute; bottom:16px; left:0; right:0; text-align:center;
    font-family:'Baloo 2',sans-serif; font-weight:700; color:#fff; font-size:16px;
    text-shadow:0 2px 10px rgba(0,0,0,0.5); opacity:0; transition:opacity .8s ease;
    padding:0 14px;
  }
  .cam-caption.show{opacity:1;}
  .cam-permission{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; padding:20px; color:#fff; text-align:center; gap:12px;
  }
  .save-btn{
    margin-top:18px; border:none; padding:12px 26px; border-radius:999px;
    background:var(--plum); color:#fff; font-family:'Baloo 2',sans-serif;
    font-weight:600; font-size:14px; cursor:pointer; opacity:0; transition:opacity .6s ease;
  }
  .save-btn.show{opacity:1;}
  .flash{position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50;}
  .flash.go{animation:flashOff .5s ease forwards;}
  @keyframes flashOff{0%{opacity:.9;} 100%{opacity:0;}}
</style>
</head>
<body>

<div id="app">

  <div id="ambient"></div>

  <div class="scene active" id="scene0">
    <div class="card grabbable" id="card0">
      <img class="mascot-img" id="imgHappy0" alt="happy penguin">
    </div>
    <h1 class="headline">swipe if you're<br>looking for love</h1>
    <div class="hint" id="hint0">swipe me →</div>
  </div>

  <div class="scene" id="scene1">
    <div class="card" id="card1">
      <div class="face-layer angryFace on">
        <img class="mascot-img" id="imgAngry1" alt="angry penguin">
      </div>
      <div class="face-layer coolFace" id="coolFace">
        <img class="mascot-img" id="imgHappyCool1" alt="calmed down penguin">
      </div>
    </div>
    <h1 class="headline" id="angryText">why did you swipe?? 😤<br>you're only mine.</h1>
    <p class="sub" id="angryHint">kiss me</p>
    <button class="kiss-btn" id="kissBtn" aria-label="kiss">💋</button>
    <div class="hint hidden" id="hint1">okay okay, swipe again →</div>
  </div>

  <div class="scene" id="scene2">
    <div class="card grabbable" id="card2">
      <img class="mascot-img" id="imgHappy2" alt="happy penguin">
    </div>
    <h1 class="headline">you know you're<br>soooo beautiful 🥹</h1>
    <p class="sub" id="dontbelieve">don't believe me? swipe →</p>
    <div class="hint hidden" id="hint2">swipe to see →</div>
  </div>

  <div class="scene" id="scene3">
    <div class="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="glow-overlay"></div>
      <div class="vignette"></div>
      <div class="sparkle-layer" id="sparkleLayer"></div>
      <div class="cam-caption" id="camCaption">see? told you 💕</div>
      <div class="cam-permission" id="permissionMsg" style="display:none;">
        <p>couldn't get your camera 🥺<br>you can still just believe me — you're beautiful.</p>
      </div>
    </div>
    <button class="save-btn" id="saveBtn">save this moment</button>
  </div>

  <div class="dots">
    <span class="d" data-i="0"></span>
    <span class="d" data-i="1"></span>
    <span class="d" data-i="2"></span>
    <span class="d" data-i="3"></span>
  </div>

</div>

<div class="flash" id="flash"></div>

<canvas id="captureCanvas" style="display:none;"></canvas>

  const scenes = [document.getElementById('scene0'),document.getElementById('scene1'),document.getElementById('scene2'),document.getElementById('scene3')];
  const dots = document.querySelectorAll('.dots .d');
  let current = 0;
  dots[0].classList.add('active');

  function goTo(i){
    scenes[current].classList.remove('active');
    current = i;
    scenes[current].classList.add('active');
    dots.forEach((d,idx)=> d.classList.toggle('active', idx===current));
    if(current===3) enterCameraScene();
  }

  let preStream = null;
  (async function requestCameraEarly(){
    try{
      // fires the native permission popup as soon as the page opens
      preStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
    }catch(err){
      // some browsers silently block this without a user tap first —
      // that's fine, we always try again for real when she reaches the camera screen
      preStream = null;
    }
  })();

  const ambient = document.getElementById('ambient');
  const emojis = ['💕','✨','💗','🌸'];
  for(let i=0;i<10;i++){
    const el = document.createElement('div');
    el.className='drift';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = (10+Math.random()*10)+'s';
    el.style.animationDelay = (Math.random()*10)+'s';
    ambient.appendChild(el);
  }

  function attachSwipe(cardEl, onSwiped){
    let startX=0,curX=0,dragging=false;
    function pointerDown(e){
      dragging = true;
      cardEl.classList.add('dragging');
      const p = e.touches ? e.touches[0] : e;
      startX = p.clientX; curX=0;
    }
    function pointerMove(e){
      if(!dragging) return;
      const p = e.touches ? e.touches[0] : e;
      curX = p.clientX - startX;
      cardEl.style.transform = `translateX(${curX}px) rotate(${curX/18}deg)`;
      cardEl.style.opacity = Math.max(1 - Math.abs(curX)/260, 0.3);
    }
    function pointerUp(){
      if(!dragging) return;
      dragging = false;
      cardEl.classList.remove('dragging');
      if(Math.abs(curX) > 80){
        const dir = curX > 0 ? 1 : -1;
        cardEl.style.transition = 'transform .4s ease, opacity .4s ease';
        cardEl.style.transform = `translateX(${dir*500}px) rotate(${dir*40}deg)`;
        cardEl.style.opacity = 0;
        setTimeout(()=>{
          cardEl.style.transition='';
          cardEl.style.transform='';
          cardEl.style.opacity=1;
          onSwiped();
        }, 380);
      } else {
        cardEl.style.transition = 'transform .3s ease, opacity .3s ease';
        cardEl.style.transform = 'translateX(0) rotate(0)';
        cardEl.style.opacity = 1;
        setTimeout(()=>{ cardEl.style.transition=''; }, 300);
      }
    }
    cardEl.addEventListener('mousedown', pointerDown);
    window.addEventListener('mousemove', pointerMove);
    window.addEventListener('mouseup', pointerUp);
    cardEl.addEventListener('touchstart', pointerDown, {passive:true});
    cardEl.addEventListener('touchmove', pointerMove, {passive:true});
    cardEl.addEventListener('touchend', pointerUp);
  }

  attachSwipe(document.getElementById('card0'), ()=> goTo(1));

  let cooled = false;
  const card1 = document.getElementById('card1');

  const angryHint = document.getElementById('angryHint');
  const hint1 = document.getElementById('hint1');
  const kissBtn = document.getElementById('kissBtn');

  function onKiss(){
    if(cooled) return;
    cooled = true;
    burstParticles(card1);
    angrySvgFace.style.transition = 'opacity .5s ease';
    angrySvgFace.classList.remove('on');
    setTimeout(()=>{
      coolSvgFace.classList.add('on');
    }, 200);
    angryText.textContent = "okay... i cooled down 😌";
    angryHint.style.display='none';
    kissBtn.classList.add('hidden');
    hint1.classList.remove('hidden');
    attachSwipe(card1, ()=> goTo(2));
  }
  kissBtn.addEventListener('click', onKiss);

  function burstParticles(container){
    for(let i=0;i<10;i++){
      const p = document.createElement('div');
      p.textContent = i%2===0 ? '💋' : '💫';
      p.style.position='absolute';
      p.style.left='50%'; p.style.top='55%';
      p.style.fontSize='16px';
      p.style.pointerEvents='none';
      const angle = Math.random()*Math.PI*2;
      const dist = 60+Math.random()*40;
      p.style.transition='transform .7s ease, opacity .7s ease';
      container.appendChild(p);
      requestAnimationFrame(()=>{
        p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        p.style.opacity='0';
      });
      setTimeout(()=> p.remove(), 750);
    }
  }

  attachSwipe(document.getElementById('card2'), ()=> goTo(3));

  let camEntered = false;
  async function enterCameraScene(){
    if(camEntered) return;
    camEntered = true;
    const video = document.getElementById('video');
    const permMsg = document.getElementById('permissionMsg');

    // use the pre-granted stream if we already have it and it's still live,
    // otherwise open the real camera fresh right now (this click is a real
    // user gesture, so this attempt is guaranteed to prompt/work)
    let stream = (preStream && preStream.getVideoTracks().some(t => t.readyState === 'live'))
      ? preStream
      : null;

    if(!stream){
      try{
        stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
      }catch(err){
        stream = null;
      }
    }

    if(stream){
      video.srcObject = stream;
      spawnSparkles();
      setTimeout(()=>{
        document.getElementById('camCaption').classList.add('show');
        document.getElementById('saveBtn').classList.add('show');
      }, 900);
    } else {
      video.style.display='none';
      permMsg.style.display='flex';
    }
  }

  function spawnSparkles(){
    const layer = document.getElementById('sparkleLayer');
    const glyphs = ['✨','💫','⭐','💗'];
    for(let i=0;i<14;i++){
      const s = document.createElement('div');
      s.className='spk';
      s.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
      s.style.left = (5+Math.random()*90)+'%';
      s.style.top = (10+Math.random()*75)+'%';
      s.style.animationDelay = (Math.random()*3)+'s';
      s.style.animationDuration = (2.4+Math.random()*2)+'s';
      layer.appendChild(s);
    }
  }

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const video = document.getElementById('video');
    if(!video.srcObject) return;
    const canvas = document.getElementById('captureCanvas');
    const w = video.videoWidth, h = video.videoHeight;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.translate(w,0); ctx.scale(-1,1);
    ctx.drawImage(video,0,0,w,h);
    ctx.restore();
    const grad = ctx.createRadialGradient(w/2,h*0.4,10, w/2,h*0.4, w*0.8);
    grad.addColorStop(0,'rgba(255,209,102,0.35)');
    grad.addColorStop(0.55,'rgba(255,111,145,0.18)');
    grad.addColorStop(1,'rgba(74,37,69,0.28)');
    ctx.globalCompositeOperation='soft-light';
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='source-over';
    ctx.font = `bold ${Math.floor(h*0.045)}px 'Baloo 2', sans-serif`;
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=10;
    ctx.fillText('you are so beautiful 💕', w/2, h*0.92);

    const flash = document.getElementById('flash');
    flash.classList.add('go');
    setTimeout(()=>flash.classList.remove('go'), 550);

    const link = document.createElement('a');
    link.download = 'you-are-beautiful.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

})();
</script>
</body>
</html>
